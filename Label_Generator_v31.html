<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Label Generator v31 — HA Device Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --dark:     #1a1f2e;
  --accent:   #2e75b6;
  --accent2:  #e8f0f8;
  --border:   #dde3ec;
  --muted:    #6b7894;
  --text:     #1a1f2e;
  --success:  #1a7a4a;
  --warn:     #b45309;
  --label-bg: #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 60px;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--border);
}
.header-left .eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.header-left h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: -0.5px;
}
.header-right {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--accent2);
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── Main layout ── */
.main {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 24px;
  align-items: start;
}

/* ── Panel ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.panel-header {
  background: var(--dark);
  padding: 14px 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ffffff;
  font-family: 'DM Mono', monospace;
}
.panel-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

/* ── Form fields ── */
.field { display: flex; flex-direction: column; gap: 5px; }
label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}
input, select, textarea {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  background: #fff;
}
textarea { resize: vertical; min-height: 52px; line-height: 1.5; }

/* ── Protocol toggle ── */
.protocol-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.proto-btn {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  transition: all 0.15s;
}
.proto-btn:hover { border-color: var(--accent); color: var(--text); }
.proto-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Generate button ── */
.btn-generate {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 13px;
  width: 100%;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-generate:hover { background: #2566a0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(46,117,182,0.3); }

/* ── Preview panel ── */
.preview-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  position: sticky;
  top: 20px;
}
.preview-header {
  background: var(--dark);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.preview-header span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  font-family: 'DM Mono', monospace;
}
.preview-body {
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  min-height: 560px;
  justify-content: center;
  background: #e8ecf2;
}
.preview-empty {
  text-align: center;
  color: var(--muted);
}
.preview-empty .icon { font-size: 40px; margin-bottom: 12px; }
.preview-empty p { font-size: 13px; line-height: 1.6; }

/* ── Label container ── */
#label-container {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
}
#label-container.visible { display: flex; }

/* ── The actual label ── */
#label-preview {
  background: #fff;
  border: 1.5px solid #c0c8d8;
  border-radius: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden;
  position: relative;
}

/* Label inner layout */
.label-inner {
  display: flex;
  align-items: stretch;
  height: 100%;
  width: 100%;
}
.label-qr {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  flex-shrink: 0;
}
.label-qr canvas, .label-qr img { display: block; }
.label-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 8px;
  overflow: hidden;
  border-left: 1px solid #e0e6ef;
}
.label-customer {
  font-family: 'DM Mono', monospace;
  color: #2e75b6;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.label-friendly {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  color: #1a1f2e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.label-device {
  font-family: 'DM Sans', sans-serif;
  color: #4a5568;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.label-proto-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}
.label-proto-badge {
  font-family: 'DM Mono', monospace;
  background: #1a1f2e;
  color: #fff;
  border-radius: 3px;
  padding: 1px 4px;
  flex-shrink: 0;
}
.label-extra {
  font-family: 'DM Mono', monospace;
  color: #6b7894;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Action buttons ── */
.action-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}
.action-row-group {
  display: flex;
  gap: 8px;
  width: 100%;
}
.action-row-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}
.btn-export {
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 9px 10px;
  flex: 1;
  transition: all 0.15s;
  text-align: center;
}
.btn-export.slp    { background: #1a6b3a; }
.btn-export.slp:hover { background: #155d38; }
.btn-export.epson  { background: #1a4f8a; }
.btn-export.epson:hover { background: #153f6e; }
.btn-export.soon   { background: #999; cursor: not-allowed; opacity: 0.7; }
.btn-secondary {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 16px;
  transition: all 0.15s;
  width: 100%;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ── Print styles ── */

/* ── DSK conditional field ── */
.conditional-field {
  display: none;
  flex-direction: column;
  gap: 5px;
}
.conditional-field.visible { display: flex; }

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 2px 0;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Home Automation Device Log · v31</div>
    <h1>Device Label Generator</h1>
  </div>
  <div class="header-right">dolivas27.github.io/ha-tools</div>
</div>

<div class="main">

  <!-- LEFT: Input form -->
  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="panel">
      <div class="panel-header">Device Information</div>
      <div class="panel-body">

        <div class="field">
          <label>Customer Name</label>
          <input type="text" id="f-customer" placeholder="e.g. Chandler">
        </div>

        <div class="field">
          <label>Room</label>
          <input type="text" id="f-room" placeholder="e.g. Master Bathroom">
        </div>

        <div class="field">
          <label>Friendly Name</label>
          <input type="text" id="f-friendly" placeholder="e.g. Mirror Sconces">
        </div>

        <div class="field">
          <label>Device Type</label>
          <input type="text" id="f-device" placeholder="e.g. Zooz ZEN77 S2 Dimmer 800LR">
        </div>

        <div class="field">
          <label>Protocol</label>
          <div class="protocol-row">
            <button class="proto-btn" data-proto="WiFi" onclick="setProto(this)">WiFi</button>
            <button class="proto-btn active" data-proto="Zigbee" onclick="setProto(this)">Zigbee</button>
            <button class="proto-btn" data-proto="Z-Wave" onclick="setProto(this)">Z-Wave</button>
            <button class="proto-btn" data-proto="Matter" onclick="setProto(this)">Matter</button>
          </div>
        </div>

        <!-- Z-Wave DSK field — shown only for Z-Wave -->
        <div class="conditional-field" id="dsk-field">
          <label>DSK First 5 Digits</label>
          <input type="text" id="f-dsk" placeholder="e.g. 12345" maxlength="5">
        </div>

        <!-- IP field — shown only for WiFi -->
        <div class="conditional-field" id="ip-field">
          <label>IP Address</label>
          <input type="text" id="f-ip" placeholder="e.g. 10.0.20.45">
        </div>

        <!-- QR value field -->
        <div class="field">
          <label>QR Code Value <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#999">(entity ID, URL, or MT: code)</span></label>
          <input type="text" id="f-qr" placeholder="e.g. switch.chandler_mirror_sconces">
        </div>

        <div class="field">
          <label>Circuit / Breaker #</label>
          <input type="text" id="f-circuit" placeholder="e.g. 15">
        </div>

      </div>
    </div>

    <button class="btn-generate" onclick="generateLabel()">Generate Label</button>

  </div>

  <!-- RIGHT: Preview -->
  <div class="preview-panel">
    <div class="preview-header">
      <span>Label Preview</span>
    </div>
    <div class="preview-body">

      <div class="preview-empty" id="preview-empty">
        <div class="icon">🏷️</div>
        <p>Fill in device information<br>and click Generate Label</p>
      </div>

      <div id="print-area">
        <div id="label-container">
          <div id="label-preview">
            <div class="label-inner">
              <div class="label-qr" id="label-qr-area"></div>
              <div class="label-content" id="label-content-area"></div>
            </div>
          </div>

          <div class="action-row">
            <div class="action-row-label">SLP Smart Label Creator</div>
            <div class="action-row-group">
              <button class="btn-export slp" onclick="exportSLPCSV()">📄 Export CSV</button>
              <button class="btn-export soon" disabled title="Coming soon">📊 Export Excel</button>
            </div>
            <div class="action-row-label">Epson LabelWorks</div>
            <div class="action-row-group">
              <button class="btn-export epson soon" disabled title="Coming soon">📄 Export CSV</button>
              <button class="btn-export epson soon" disabled title="Coming soon">📊 Export Excel</button>
            </div>
            <button class="btn-secondary" onclick="clearForm()">Clear</button>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  // State
  let currentProto = 'Zigbee';
  const labelW = 384, labelH = 216; // fixed preview size

  // ── On load: parse URL params ─────────────────────────────────────────────
  function normalizeProtocol(val) {
    if (!val) return 'Zigbee';
    const v = val.toLowerCase();
    if (v.includes('matter')) return 'Matter';
    if (v.includes('z-wave') || v.includes('zwave')) return 'Z-Wave';
    if (v.includes('zigbee')) return 'Zigbee';
    if (v.includes('wifi') || v.includes('wi-fi')) return 'WiFi';
    return 'Zigbee';
  }

  window.addEventListener('load', () => {
    const p = new URLSearchParams(window.location.search);
    if (p.get('cust'))    document.getElementById('f-customer').value = decodeURIComponent(p.get('cust'));
    if (p.get('room'))    document.getElementById('f-room').value      = decodeURIComponent(p.get('room'));
    if (p.get('name'))    document.getElementById('f-friendly').value  = decodeURIComponent(p.get('name'));
    if (p.get('dev'))     document.getElementById('f-device').value    = decodeURIComponent(p.get('dev'));
    if (p.get('proto'))   { currentProto = normalizeProtocol(decodeURIComponent(p.get('proto'))); syncProtoButtons(); }
    if (p.get('ckt'))     document.getElementById('f-circuit').value   = decodeURIComponent(p.get('ckt'));
    if (p.get('dsk'))     document.getElementById('f-dsk').value       = decodeURIComponent(p.get('dsk'));
    if (p.get('ip'))      document.getElementById('f-ip').value        = decodeURIComponent(p.get('ip'));
    updateConditionalFields();
    if (p.get('cust') || p.get('name')) generateLabel();
  });

  function syncProtoButtons() {
    document.querySelectorAll('.proto-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.proto === currentProto);
    });
  }

  function setProto(btn) {
    currentProto = btn.dataset.proto;
    syncProtoButtons();
    updateConditionalFields();
    generateLabel();
  }

  function updateConditionalFields() {
    document.getElementById('dsk-field').classList.toggle('visible', currentProto === 'Z-Wave');
    document.getElementById('ip-field').classList.toggle('visible', currentProto === 'WiFi' || currentProto === 'Zigbee' || currentProto === 'Matter');
  }

  // ── Generate label ─────────────────────────────────────────────────────────
  function generateLabel() {
    const customer = document.getElementById('f-customer').value.trim();
    const room     = document.getElementById('f-room').value.trim();
    const friendly = document.getElementById('f-friendly').value.trim();
    const device   = document.getElementById('f-device').value.trim();
    const qrVal    = document.getElementById('f-qr').value.trim();
    const circuit  = document.getElementById('f-circuit').value.trim();
    const dsk      = document.getElementById('f-dsk').value.trim();
    const ip       = document.getElementById('f-ip').value.trim();

    if (!friendly && !device) return;

    // Strip room name from friendly name to avoid redundancy on label
    // Handles formats like "Master Bedroom - Left Nightstand" or "Master Bedroom Left Nightstand"
    let displayFriendly = friendly;
    if (room && friendly.toLowerCase().startsWith(room.toLowerCase())) {
      displayFriendly = friendly.substring(room.length).replace(/^[\s\-–—·|,]+/, '').trim();
    }
    // Also strip customer name if it appears at the start
    if (customer && displayFriendly.toLowerCase().startsWith(customer.toLowerCase())) {
      displayFriendly = displayFriendly.substring(customer.length).replace(/^[\s\-–—·|,]+/, '').trim();
    }
    // Fallback to original if stripping left nothing
    if (!displayFriendly) displayFriendly = friendly;

    // Size the label element
    const label = document.getElementById('label-preview');
    label.style.width  = labelW + 'px';
    label.style.height = labelH + 'px';

    // QR code size — proportion of label height with padding
    const qrSize = Math.max(Math.min(labelH - 10, 70), 30);
    const qrArea = document.getElementById('label-qr-area');
    qrArea.innerHTML = '';
    qrArea.style.width  = (qrSize + 10) + 'px';
    qrArea.style.minWidth = (qrSize + 10) + 'px';
    qrArea.style.padding = '5px';

    if (qrVal) {
      new QRCode(qrArea, {
        text: qrVal,
        width: qrSize,
        height: qrSize,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } else {
      qrArea.style.display = 'none';
      document.getElementById('label-content-area').style.borderLeft = 'none';
    }

    // Content scaling based on label size
    const scale  = labelH / 90; // 90px = base height
    const fs1    = Math.max(7,  Math.round(9  * scale));  // customer/room
    const fs2    = Math.max(9,  Math.round(12 * scale));  // friendly name
    const fs3    = Math.max(7,  Math.round(9  * scale));  // device type
    const fsBadge= Math.max(6,  Math.round(8  * scale));  // protocol badge
    const fsExtra= Math.max(6,  Math.round(8  * scale));  // DSK/IP

    const content = document.getElementById('label-content-area');
    content.style.padding = `0 ${Math.round(6*scale)}px`;

    let html = '';

    // Customer | Room
    if (customer || room) {
      html += `<div class="label-customer" style="font-size:${fs1}px">
        ${[customer, room].filter(Boolean).join(' · ')}
      </div>`;
    }

    // Friendly name — largest text — uses stripped version
    if (displayFriendly) {
      html += `<div class="label-friendly" style="font-size:${fs2}px;margin:${Math.round(2*scale)}px 0">
        ${displayFriendly}
      </div>`;
    }

    // Device type
    if (device) {
      html += `<div class="label-device" style="font-size:${fs3}px">${device}</div>`;
    }

    // Protocol badge + conditional extra info
    let extraInfo = '';
    if (currentProto === 'Z-Wave' && dsk) {
      extraInfo = `DSK: <strong>${dsk}</strong>`;
    } else if (currentProto === 'WiFi' && ip) {
      extraInfo = ip;
    } else if (currentProto === 'Matter') {
      extraInfo = 'MT: code on file';
    }

    let circuitInfo = circuit ? `· Breaker <strong>${circuit}</strong>` : '';

    // For Zigbee/Matter with IP — show protocol badge first, then WiFi badge + IP on second line
    const showWifiBadge = (currentProto === 'Zigbee' || currentProto === 'Matter') && ip;

    html += `<div class="label-proto-row" style="margin-top:${Math.round(3*scale)}px">
      <div class="label-proto-badge" style="font-size:${fsBadge}px">${currentProto}</div>
      ${extraInfo ? `<div class="label-extra" style="font-size:${fsExtra}px">${extraInfo}</div>` : ''}
      ${circuitInfo ? `<div class="label-extra" style="font-size:${fsExtra}px;margin-left:4px">${circuitInfo}</div>` : ''}
    </div>
    ${showWifiBadge ? `<div class="label-proto-row" style="margin-top:${Math.round(2*scale)}px">
      <div class="label-proto-badge" style="font-size:${fsBadge}px;background:#1a7a3c">WiFi</div>
      <div class="label-extra" style="font-size:${fsExtra}px">${ip}</div>
    </div>` : ''}`;

    content.innerHTML = html;

    // Show label
    document.getElementById('preview-empty').style.display = 'none';
    document.getElementById('label-container').classList.add('visible');
  }

  function exportSLPCSV() {
    const customer = document.getElementById('f-customer').value.trim();
    const room     = document.getElementById('f-room').value.trim();
    const friendly = document.getElementById('f-friendly').value.trim();
    const device   = document.getElementById('f-device').value.trim();
    const circuit  = document.getElementById('f-circuit').value.trim();
    const dsk      = document.getElementById('f-dsk').value.trim();

    // Strip room from friendly name
    let displayFriendly = friendly;
    if (room) {
      const re = new RegExp('^' + room.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '[\\s\\-_]*') + '[\\s\\-_]*', 'i');
      displayFriendly = friendly.replace(re, '').trim();
    }

    const escape = val => `"${val.replace(/"/g, '""')}"`;

    const headers = ['Customer','Room','FriendlyName','DeviceType','Protocol','Circuit','DSK','IPAddress'];
    const values  = [customer, room, displayFriendly, device, currentProto, circuit, dsk, ip];

    const csv = headers.map(escape).join(',') + '\r\n'
              + values.map(escape).join(',') + '\r\n';

    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `SLP_Label_${[customer, displayFriendly].filter(Boolean).join('_').replace(/\s+/g,'_')}.csv`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  function clearForm() {
    ['f-customer','f-room','f-friendly','f-device','f-qr','f-circuit','f-dsk','f-ip'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('label-container').classList.remove('visible');
    document.getElementById('preview-empty').style.display = '';
    document.getElementById('label-qr-area').style.display = '';
  }
</script>
</body>
</html>
